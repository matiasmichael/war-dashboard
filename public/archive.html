<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing — Iran War Update</title>
  <meta name="description" content="Historical daily intelligence briefings from the Iran-Israel conflict">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔶</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAF8F5;
      --surface: #ffffff;
      --surface-hover: #F5F2EE;
      --border: #E8E4DF;
      --border-light: #E4DDD5;
      --text: #1E1B18;
      --text-secondary: #3D3830;
      --text-muted: #7A746D;
      --accent: #E8732C;
      --accent-gold: #F5C542;
      --accent-soft: #FFF3EB;
      --shadow-sm: 0 1px 2px rgba(30,27,24,0.04);
      --shadow-md: 0 2px 8px rgba(30,27,24,0.06);
      --shadow-lg: 0 4px 16px rgba(30,27,24,0.08);
      --shadow-card: 0 1px 4px rgba(30,27,24,0.05), 0 2px 8px rgba(30,27,24,0.04);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-link {
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: opacity 0.15s;
    }

    .back-link:hover { opacity: 0.7; }

    /* ===== DATE PICKER ===== */
    .date-picker-bar {
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-picker-bar::-webkit-scrollbar { display: none; }

    .date-pill {
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
    }

    .date-pill:hover {
      border-color: var(--accent-gold);
      color: var(--text-secondary);
      background: var(--surface-hover);
    }

    .date-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ===== NAV ARROWS ===== */
    .day-nav {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .day-nav-btn {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .day-nav-btn:hover { background: var(--accent-soft); }
    .day-nav-btn.disabled { color: var(--text-muted); opacity: 0.4; pointer-events: none; }

    .day-nav-date {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* ===== BRIEFING CARDS — Distinct separated cards ===== */
    .briefing-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      margin-bottom: 0.65rem;
    }

    .briefing-header {
      background: linear-gradient(135deg, #1E1B18 0%, #2C2824 100%);
      padding: 1.5rem 1.5rem 1.25rem;
      color: #fff;
    }

    .briefing-date-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
      margin-bottom: 0.4rem;
    }

    .briefing-headline {
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    /* ===== ESCALATION BADGE — BIG & PROMINENT ===== */
    .escalation-badge-big {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      margin-top: 0.85rem;
      letter-spacing: -0.01em;
    }

    .escalation-1 { background: #065f46; color: #a7f3d0; }
    .escalation-2 { background: #854d0e; color: #fef08a; }
    .escalation-3 { background: #9a3412; color: #fed7aa; }
    .escalation-4 { background: #991b1b; color: #fecaca; }
    .escalation-5 { background: #7f1d1d; color: #fca5a5; }

    /* ===== SECTION ===== */
    .section {
      padding: 1.25rem 1.5rem;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .section-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    .section-body p { margin-bottom: 0.75rem; }
    .section-body p:last-child { margin-bottom: 0; }

    /* ===== OUTLOOK BOX ===== */
    .outlook-box {
      background: linear-gradient(135deg, var(--accent-soft) 0%, #FFF8F0 100%);
      border: 1px solid #F5DFC8;
      border-radius: var(--radius-sm);
      padding: 1rem 1.15rem;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .outlook-box .outlook-icon {
      font-size: 1.1rem;
      margin-right: 0.3rem;
    }

    /* ===== KEY EVENTS TIMELINE ===== */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline-event {
      display: flex;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-light);
      position: relative;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 6px;
      margin: 0 -0.5rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }

    .timeline-event:hover {
      background: var(--surface-hover);
    }

    .timeline-event:active {
      background: #EDE9E4;
    }

    .timeline-event:last-child { border-bottom: none; }

    .timeline-time {
      flex-shrink: 0;
      width: 72px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      padding-top: 0.15rem;
      text-align: right;
    }

    .timeline-time-label {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 0.05rem;
    }

    .timeline-dot-col {
      flex-shrink: 0;
      width: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.35rem;
    }

    .timeline-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .timeline-content {
      flex: 1;
      min-width: 0;
      border-left: 2px solid var(--border-light);
      padding-left: 0.75rem;
      margin-left: -6px;
    }

    .timeline-event:last-child .timeline-content {
      border-left-color: transparent;
    }

    .timeline-headline {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .timeline-source {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* ===== CATEGORY TAGS ===== */
    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.1rem 0.45rem;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-left: 0.4rem;
      vertical-align: middle;
      letter-spacing: 0.02em;
    }

    .cat-diplomacy { background: #DBEAFE; color: #1E40AF; }
    .cat-military { background: #FEE2E2; color: #991B1B; }
    .cat-intelligence { background: #FEF3C7; color: #92400E; }
    .cat-proxy { background: #EDE9FE; color: #5B21B6; }

    /* ===== TIMELINE DESCRIPTION — Collapsed by default ===== */
    .timeline-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-top: 0.3rem;
      display: none;
      padding-top: 0.25rem;
      border-top: 1px solid var(--border-light);
    }

    .timeline-event.expanded .timeline-desc {
      display: block;
    }

    .timeline-expand-hint {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      transition: opacity 0.15s;
    }

    .timeline-event.expanded .timeline-expand-hint {
      display: none;
    }

    /* ===== WHAT CHANGED TODAY ===== */
    .what-changed-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .what-changed-list li {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text-secondary);
      padding: 0.4rem 0;
      padding-left: 1.2rem;
      position: relative;
    }

    .what-changed-list li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    .what-changed-list li + li {
      border-top: 1px solid var(--border-light);
    }

    /* ===== DATA NOTES (collapsed stats) ===== */
    .data-notes {
      padding: 0.75rem 1.5rem;
    }

    .data-notes-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0;
      transition: color 0.15s;
    }

    .data-notes-toggle:hover { color: var(--text-secondary); }

    .data-notes-chevron {
      transition: transform 0.2s;
      font-size: 0.85rem;
    }

    .data-notes-toggle.open .data-notes-chevron {
      transform: rotate(90deg);
    }

    .data-notes-content {
      display: none;
      padding-top: 0.5rem;
    }

    .data-notes-content.open {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .data-note-item {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .data-note-item strong {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ===== BRIEFING FOOTER — Generation time + Nav ===== */
    .briefing-footer {
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .briefing-gen-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .briefing-nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .briefing-nav-link {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      background: none;
      border: none;
      padding: 0.3rem 0;
    }

    .briefing-nav-link:hover { opacity: 0.7; }
    .briefing-nav-link.disabled { color: var(--text-muted); opacity: 0.4; pointer-events: none; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-size: 0.88rem;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ===== LOADING STATE ===== */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .loading .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MOBILE ===== */
    @supports (padding: env(safe-area-inset-bottom)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    @media (max-width: 600px) {
      body {
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
      }

      .header {
        padding: 0.5rem 1rem;
        padding-top: calc(0.5rem + env(safe-area-inset-top, 0px));
      }

      .header h1 { font-size: 1.05rem; }

      .date-picker-bar {
        padding: 0.5rem 1rem;
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
      }

      .day-nav { padding: 0 1rem; }

      .container { padding: 0 0.85rem 2rem; }

      .briefing-header { padding: 1.15rem 1rem 1rem; }
      .briefing-headline { font-size: 1.25rem; }

      .briefing-date-label { font-size: 0.75rem; }

      .escalation-badge-big {
        font-size: 0.9rem;
        padding: 0.35rem 0.75rem;
      }

      .section { padding: 1rem; }
      .section-title { font-size: 0.78rem; }

      .section-body { font-size: 0.92rem; }

      .timeline-time { width: 60px; font-size: 0.75rem; }
      .timeline-headline { font-size: 0.95rem; }
      .timeline-desc { font-size: 0.8rem; }
      .timeline-time-label { font-size: 0.6rem; }

      .data-notes { padding: 0.75rem 1rem; }

      .briefing-footer { padding: 0.85rem 1rem; }
      .briefing-footer {
        padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
      }
    }

    @media (max-width: 375px) {
      .header h1 { font-size: 0.95rem; }
      .briefing-headline { font-size: 1.15rem; }
      .section { padding: 0.85rem; }
      .section-body { font-size: 0.92rem; }
      .timeline-headline { font-size: 0.92rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <h1>📅 Daily Briefing</h1>
      <a href="/" class="back-link">← Live Feed</a>
    </div>
  </div>

  <div class="date-picker-bar" id="datePicker"></div>

  <div class="day-nav" id="dayNav">
    <button class="day-nav-btn" id="prevDay" onclick="navigateDay(-1)">← Previous</button>
    <span class="day-nav-date" id="currentDateLabel"></span>
    <button class="day-nav-btn" id="nextDay" onclick="navigateDay(1)">Next →</button>
  </div>

  <div class="container" id="briefingContainer">
    <div class="loading">
      <div class="spinner"></div>
      Loading briefing...
    </div>
  </div>

  <script>
    // ===== STATE =====
    let availableDates = [];
    let currentDate = null;
    const ISRAEL_TZ = 'Asia/Jerusalem';

    // ===== INIT =====
    async function init() {
      try {
        const res = await fetch('/api/archive/dates');
        if (res.ok) {
          availableDates = await res.json();
        }
      } catch (e) {
        console.warn('Could not fetch dates from API, trying static manifest');
      }

      if (availableDates.length === 0) {
        try {
          const res = await fetch('/data/daily/manifest.json');
          if (res.ok) {
            availableDates = await res.json();
          }
        } catch (e) {
          console.warn('No manifest found');
        }
      }

      if (availableDates.length === 0) {
        document.getElementById('briefingContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h2>No briefings yet</h2>
            <p>Daily intelligence summaries will appear here once the first daily summary is generated. Check back tomorrow.</p>
          </div>
        `;
        return;
      }

      availableDates.sort((a, b) => b.localeCompare(a));

      const hashDate = window.location.hash.replace('#', '');
      if (hashDate && availableDates.includes(hashDate)) {
        currentDate = hashDate;
      } else {
        currentDate = availableDates[0];
      }

      renderDatePicker();
      loadBriefing(currentDate);
    }

    function renderDatePicker() {
      const picker = document.getElementById('datePicker');
      picker.innerHTML = availableDates.map(d => {
        const date = new Date(d + 'T12:00:00');
        const label = date.toLocaleDateString('en-US', { timeZone: ISRAEL_TZ, month: 'short', day: 'numeric' });
        const isActive = d === currentDate ? 'active' : '';
        return `<a class="date-pill ${isActive}" href="#${d}" onclick="event.preventDefault(); loadBriefing('${d}')">${label}</a>`;
      }).join('');
    }

    function navigateDay(delta) {
      const idx = availableDates.indexOf(currentDate);
      const newIdx = idx - delta;
      if (newIdx >= 0 && newIdx < availableDates.length) {
        loadBriefing(availableDates[newIdx]);
      }
    }

    function updateNavButtons() {
      const idx = availableDates.indexOf(currentDate);
      const prevBtn = document.getElementById('prevDay');
      const nextBtn = document.getElementById('nextDay');
      prevBtn.classList.toggle('disabled', idx >= availableDates.length - 1);
      nextBtn.classList.toggle('disabled', idx <= 0);

      const date = new Date(currentDate + 'T12:00:00');
      document.getElementById('currentDateLabel').textContent = date.toLocaleDateString('en-US', {
        timeZone: ISRAEL_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function loadBriefing(dateStr) {
      currentDate = dateStr;
      window.location.hash = dateStr;

      renderDatePicker();
      updateNavButtons();

      const container = document.getElementById('briefingContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading briefing...</div>';

      try {
        let data;
        let res = await fetch(`/api/archive/${dateStr}`);
        if (res.ok) {
          data = await res.json();
        } else {
          res = await fetch(`/data/daily/${dateStr}.json`);
          if (!res.ok) throw new Error('Briefing not found');
          data = await res.json();
        }

        renderBriefing(data);
      } catch (e) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <h2>Briefing not available</h2>
            <p>The daily summary for ${dateStr} couldn't be loaded. It may not have been generated yet.</p>
          </div>
        `;
      }
    }

    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getEscalationLabel(level) {
      const labels = {
        1: { text: 'Calm', emoji: '🟢' },
        2: { text: 'Tensions', emoji: '🟡' },
        3: { text: 'Active Conflict', emoji: '🟠' },
        4: { text: 'Major Escalation', emoji: '🔴' },
        5: { text: 'Full-Scale War', emoji: '⚫' }
      };
      return labels[level] || labels[3];
    }

    function getCategoryTag(category) {
      const cats = {
        diplomacy: { emoji: '🤝', label: 'Diplomacy', cls: 'cat-diplomacy' },
        military: { emoji: '💥', label: 'Military', cls: 'cat-military' },
        intelligence: { emoji: '🕵️', label: 'Intelligence', cls: 'cat-intelligence' },
        proxy: { emoji: '🌍', label: 'Proxy', cls: 'cat-proxy' }
      };
      const cat = cats[(category || '').toLowerCase()];
      if (!cat) return '';
      return `<span class="category-tag ${cat.cls}">${cat.emoji} ${cat.label}</span>`;
    }

    function toggleTimeline(el) {
      el.classList.toggle('expanded');
    }

    function toggleDataNotes(btn) {
      btn.classList.toggle('open');
      const content = btn.nextElementSibling;
      content.classList.toggle('open');
    }

    function getNavDateLabel(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    }

    function renderBriefing(data) {
      const container = document.getElementById('briefingContainer');
      const date = new Date(data.date + 'T12:00:00');
      const dateFormatted = date.toLocaleDateString('en-US', {
        timeZone: ISRAEL_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      const stats = data.statistics || {};
      const escLevel = stats.escalation_level || 3;
      const esc = getEscalationLabel(escLevel);

      // Build nav links
      const idx = availableDates.indexOf(currentDate);
      const prevDate = idx < availableDates.length - 1 ? availableDates[idx + 1] : null;
      const nextDate = idx > 0 ? availableDates[idx - 1] : null;

      const prevLink = prevDate
        ? `<a class="briefing-nav-link" href="#${prevDate}" onclick="event.preventDefault(); loadBriefing('${prevDate}')">← ${getNavDateLabel(prevDate)} Briefing</a>`
        : `<span class="briefing-nav-link disabled">← Previous</span>`;
      const nextLink = nextDate
        ? `<a class="briefing-nav-link" href="#${nextDate}" onclick="event.preventDefault(); loadBriefing('${nextDate}')">${getNavDateLabel(nextDate)} Briefing →</a>`
        : `<span class="briefing-nav-link disabled">Next →</span>`;

      // Key events HTML
      const eventsHTML = (data.key_events || []).map(ev => `
        <div class="timeline-event" onclick="toggleTimeline(this)">
          <div class="timeline-time">
            ${escHtml(ev.time)}
            <span class="timeline-time-label">(Israel)</span>
          </div>
          <div class="timeline-dot-col">
            <div class="timeline-dot"></div>
          </div>
          <div class="timeline-content">
            <div class="timeline-headline">${escHtml(ev.headline)}${getCategoryTag(ev.category)}</div>
            <div class="timeline-source">${escHtml(ev.source)}</div>
            ${ev.description ? `<div class="timeline-desc">${escHtml(ev.description)}</div>` : ''}
          </div>
        </div>
      `).join('');

      // What Changed Today (fallback to advancements if what_changed not present)
      let whatChangedHTML = '';
      if (data.what_changed && Array.isArray(data.what_changed) && data.what_changed.length > 0) {
        whatChangedHTML = `
          <div class="briefing-card">
            <div class="section">
              <div class="section-title">⚡ What Changed Today</div>
              <ul class="what-changed-list">
                ${data.what_changed.slice(0, 3).map(item => `<li>${escHtml(item)}</li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      } else if (data.advancements) {
        // Legacy fallback — render advancements in old format
        whatChangedHTML = `
          <div class="briefing-card">
            <div class="section">
              <div class="section-title">⚡ What Changed Today</div>
              <div class="section-body">${data.advancements}</div>
            </div>
          </div>
        `;
      }

      // Generation timestamp — always Israel timezone
      const genTime = new Date().toLocaleString('en-US', {
        timeZone: ISRAEL_TZ,
        hour: 'numeric',
        minute: '2-digit',
        month: 'long',
        day: 'numeric',
        hour12: true
      }) + ' IDT';

      // === RENDER — New section order ===
      // 1. Headline + Escalation (header card)
      // 2. Outlook (teaser)
      // 3. Key Events
      // 4. Summary
      // 5. What Changed Today (reduced)
      // 6. Data Notes (collapsed stats)
      // 7. Footer with nav + timestamp

      container.innerHTML = `
        <!-- CARD 1: Headline + Escalation -->
        <div class="briefing-card">
          <div class="briefing-header">
            <div class="briefing-date-label">Daily Intelligence Briefing · ${dateFormatted}</div>
            <h2 class="briefing-headline">${escHtml(data.headline)}</h2>
            <div class="escalation-badge-big escalation-${escLevel}">${esc.emoji} ${esc.text}</div>
          </div>
        </div>

        <!-- CARD 2: Outlook (teaser) -->
        ${data.outlook ? `
        <div class="briefing-card">
          <div class="section">
            <div class="section-title">🔮 Outlook</div>
            <div class="outlook-box"><span class="outlook-icon">👁️</span> ${escHtml(data.outlook)}</div>
          </div>
        </div>
        ` : ''}

        <!-- CARD 3: Key Events -->
        <div class="briefing-card">
          <div class="section">
            <div class="section-title">⏱️ Key Events</div>
            <div class="timeline">
              ${eventsHTML || '<p style="color:var(--text-muted);font-size:0.85rem">No key events recorded.</p>'}
            </div>
          </div>
        </div>

        <!-- CARD 4: Summary -->
        <div class="briefing-card">
          <div class="section">
            <div class="section-title">📋 Daily Summary</div>
            <div class="section-body">${data.summary || '<p>No summary available.</p>'}</div>
          </div>
        </div>

        <!-- CARD 5: What Changed Today -->
        ${whatChangedHTML}

        <!-- CARD 6: Data Notes (collapsed stats) -->
        <div class="briefing-card">
          <div class="data-notes">
            <button class="data-notes-toggle" onclick="toggleDataNotes(this)">
              <span class="data-notes-chevron">›</span>
              Data Notes
            </button>
            <div class="data-notes-content">
              <div class="data-note-item">📰 <strong>${stats.total_articles || '—'}</strong> articles</div>
              <div class="data-note-item">🌐 <strong>${stats.sources_reporting || '—'}</strong> sources</div>
              <div class="data-note-item">🏆 ${escHtml(stats.most_active_source || '—')} most active</div>
            </div>
          </div>
        </div>

        <!-- CARD 7: Footer with nav + timestamp -->
        <div class="briefing-card">
          <div class="briefing-footer">
            <div class="briefing-gen-time">Briefing generated at ${genTime}</div>
            <div class="briefing-nav-links">
              ${prevLink}
              ${nextLink}
            </div>
          </div>
        </div>
      `;
    }

    // Kick off
    init();
  </script>
</body>
</html>
