<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Briefing — Iran War Update</title>
  <meta name="description" content="Historical daily intelligence briefings from the Iran-Israel conflict">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔶</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAF8F5;
      --surface: #ffffff;
      --surface-hover: #F5F2EE;
      --border: #E8E4DF;
      --border-light: #F0ECE7;
      --text: #1E1B18;
      --text-secondary: #2C2824;
      --text-muted: #7A746D;
      --accent: #E8732C;
      --accent-gold: #F5C542;
      --accent-soft: #FFF3EB;
      --shadow-sm: 0 1px 2px rgba(30,27,24,0.04);
      --shadow-md: 0 2px 8px rgba(30,27,24,0.06);
      --shadow-lg: 0 4px 16px rgba(30,27,24,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-link {
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: opacity 0.15s;
    }

    .back-link:hover { opacity: 0.7; }

    /* ===== DATE PICKER ===== */
    .date-picker-bar {
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .date-picker-bar::-webkit-scrollbar { display: none; }

    .date-pill {
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
    }

    .date-pill:hover {
      border-color: var(--accent-gold);
      color: var(--text-secondary);
      background: var(--surface-hover);
    }

    .date-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ===== NAV ARROWS ===== */
    .day-nav {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .day-nav-btn {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .day-nav-btn:hover { background: var(--accent-soft); }
    .day-nav-btn.disabled { color: var(--text-muted); opacity: 0.4; pointer-events: none; }

    .day-nav-date {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* ===== BRIEFING CARD ===== */
    .briefing-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      margin-bottom: 1.25rem;
    }

    .briefing-header {
      background: linear-gradient(135deg, #1E1B18 0%, #2C2824 100%);
      padding: 1.5rem 1.5rem 1.25rem;
      color: #fff;
    }

    .briefing-date-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-gold);
      margin-bottom: 0.4rem;
    }

    .briefing-headline {
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .briefing-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .briefing-meta-item {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .briefing-meta-item strong {
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .escalation-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .escalation-1 { background: #065f46; color: #a7f3d0; }
    .escalation-2 { background: #854d0e; color: #fef08a; }
    .escalation-3 { background: #9a3412; color: #fed7aa; }
    .escalation-4 { background: #991b1b; color: #fecaca; }
    .escalation-5 { background: #7f1d1d; color: #fca5a5; }

    /* ===== SECTION ===== */
    .section {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-light);
    }

    .section:last-child { border-bottom: none; }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .section-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    .section-body p { margin-bottom: 0.75rem; }
    .section-body p:last-child { margin-bottom: 0; }

    /* ===== KEY EVENTS TIMELINE ===== */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline-event {
      display: flex;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-light);
      position: relative;
    }

    .timeline-event:last-child { border-bottom: none; }

    .timeline-time {
      flex-shrink: 0;
      width: 60px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      padding-top: 0.15rem;
      text-align: right;
    }

    .timeline-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 0.35rem;
      position: relative;
    }

    .timeline-dot::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 10px;
      width: 2px;
      height: calc(100% + 12px);
      background: var(--border-light);
    }

    .timeline-event:last-child .timeline-dot::after { display: none; }

    .timeline-content { flex: 1; min-width: 0; }

    .timeline-headline {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }

    .timeline-source {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .timeline-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-top: 0.3rem;
    }

    /* ===== OUTLOOK ===== */
    .outlook-box {
      background: linear-gradient(135deg, var(--accent-soft) 0%, #FFF8F0 100%);
      border: 1px solid #F5DFC8;
      border-radius: var(--radius-sm);
      padding: 1rem 1.15rem;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .outlook-box .outlook-icon {
      font-size: 1.1rem;
      margin-right: 0.3rem;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-size: 0.88rem;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ===== LOADING STATE ===== */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .loading .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.72rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    /* ===== MOBILE ===== */
    @supports (padding: env(safe-area-inset-bottom)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }

    @media (max-width: 600px) {
      body {
        -webkit-tap-highlight-color: transparent;
        -webkit-text-size-adjust: 100%;
      }

      .header {
        padding: 0.5rem 1rem;
        padding-top: calc(0.5rem + env(safe-area-inset-top, 0px));
      }

      .header h1 { font-size: 1.05rem; }

      .date-picker-bar {
        padding: 0.5rem 1rem;
        -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
      }

      .day-nav { padding: 0 1rem; }

      .container { padding: 0 0.85rem 2rem; }

      .briefing-header { padding: 1.15rem 1rem 1rem; }
      .briefing-headline { font-size: 1.1rem; }
      .briefing-meta { gap: 0.5rem; }

      .section { padding: 1rem; }

      .timeline-time { width: 50px; font-size: 0.68rem; }
      .timeline-headline { font-size: 0.84rem; }
      .timeline-desc { font-size: 0.8rem; }

      .footer {
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      }
    }

    @media (max-width: 375px) {
      .header h1 { font-size: 0.95rem; }
      .briefing-headline { font-size: 1rem; }
      .section { padding: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-inner">
      <h1>📅 Daily Briefing</h1>
      <a href="/" class="back-link">← Live Feed</a>
    </div>
  </div>

  <div class="date-picker-bar" id="datePicker"></div>

  <div class="day-nav" id="dayNav">
    <button class="day-nav-btn" id="prevDay" onclick="navigateDay(-1)">← Previous</button>
    <span class="day-nav-date" id="currentDateLabel"></span>
    <button class="day-nav-btn" id="nextDay" onclick="navigateDay(1)">Next →</button>
  </div>

  <div class="container" id="briefingContainer">
    <div class="loading">
      <div class="spinner"></div>
      Loading briefing...
    </div>
  </div>

  <div class="footer">
    <p>Iran War Update · Daily Briefing · AI-synthesized briefings</p>
    <p style="margin-top:0.35rem; opacity:0.7;">hmviva.us</p>
  </div>

  <script>
    // ===== STATE =====
    let availableDates = [];
    let currentDate = null;

    // ===== INIT =====
    async function init() {
      // Load manifest of available daily summaries
      try {
        const res = await fetch('/api/archive/dates');
        if (res.ok) {
          availableDates = await res.json();
        }
      } catch (e) {
        console.warn('Could not fetch dates from API, trying static manifest');
      }

      // If no API, try static manifest
      if (availableDates.length === 0) {
        try {
          const res = await fetch('/data/daily/manifest.json');
          if (res.ok) {
            availableDates = await res.json();
          }
        } catch (e) {
          console.warn('No manifest found');
        }
      }

      if (availableDates.length === 0) {
        document.getElementById('briefingContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h2>No briefings yet</h2>
            <p>Daily intelligence summaries will appear here once the first daily summary is generated. Check back tomorrow.</p>
          </div>
        `;
        return;
      }

      // Sort dates descending
      availableDates.sort((a, b) => b.localeCompare(a));

      // Check URL hash for date
      const hashDate = window.location.hash.replace('#', '');
      if (hashDate && availableDates.includes(hashDate)) {
        currentDate = hashDate;
      } else {
        currentDate = availableDates[0]; // Most recent
      }

      renderDatePicker();
      loadBriefing(currentDate);
    }

    function renderDatePicker() {
      const picker = document.getElementById('datePicker');
      picker.innerHTML = availableDates.map(d => {
        const date = new Date(d + 'T12:00:00');
        const label = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const isActive = d === currentDate ? 'active' : '';
        return `<a class="date-pill ${isActive}" href="#${d}" onclick="event.preventDefault(); loadBriefing('${d}')">${label}</a>`;
      }).join('');
    }

    function navigateDay(delta) {
      const idx = availableDates.indexOf(currentDate);
      // Dates are sorted descending, so -1 = newer, +1 = older
      const newIdx = idx - delta;
      if (newIdx >= 0 && newIdx < availableDates.length) {
        loadBriefing(availableDates[newIdx]);
      }
    }

    function updateNavButtons() {
      const idx = availableDates.indexOf(currentDate);
      const prevBtn = document.getElementById('prevDay');
      const nextBtn = document.getElementById('nextDay');
      // Descending: index 0 = newest
      // "Previous Day" = older = higher index
      prevBtn.classList.toggle('disabled', idx >= availableDates.length - 1);
      // "Next Day" = newer = lower index
      nextBtn.classList.toggle('disabled', idx <= 0);

      const date = new Date(currentDate + 'T12:00:00');
      document.getElementById('currentDateLabel').textContent = date.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    async function loadBriefing(dateStr) {
      currentDate = dateStr;
      window.location.hash = dateStr;

      renderDatePicker();
      updateNavButtons();

      const container = document.getElementById('briefingContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading briefing...</div>';

      try {
        // Try API first, then static file
        let data;
        let res = await fetch(`/api/archive/${dateStr}`);
        if (res.ok) {
          data = await res.json();
        } else {
          res = await fetch(`/data/daily/${dateStr}.json`);
          if (!res.ok) throw new Error('Briefing not found');
          data = await res.json();
        }

        renderBriefing(data);
      } catch (e) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <h2>Briefing not available</h2>
            <p>The daily summary for ${dateStr} couldn't be loaded. It may not have been generated yet.</p>
          </div>
        `;
      }
    }

    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getEscalationLabel(level) {
      const labels = {
        1: { text: 'Calm', emoji: '🟢' },
        2: { text: 'Tensions', emoji: '🟡' },
        3: { text: 'Active Conflict', emoji: '🟠' },
        4: { text: 'Major Escalation', emoji: '🔴' },
        5: { text: 'Full-Scale War', emoji: '⚫' }
      };
      return labels[level] || labels[3];
    }

    function renderBriefing(data) {
      const container = document.getElementById('briefingContainer');
      const date = new Date(data.date + 'T12:00:00');
      const dateFormatted = date.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      const stats = data.statistics || {};
      const escLevel = stats.escalation_level || 3;
      const esc = getEscalationLabel(escLevel);

      const eventsHTML = (data.key_events || []).map(ev => `
        <div class="timeline-event">
          <div class="timeline-time">${escHtml(ev.time)}</div>
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <div class="timeline-headline">${escHtml(ev.headline)}</div>
            <div class="timeline-source">${escHtml(ev.source)}</div>
            ${ev.description ? `<div class="timeline-desc">${escHtml(ev.description)}</div>` : ''}
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="briefing-card">
          <div class="briefing-header">
            <div class="briefing-date-label">Daily Intelligence Briefing · ${dateFormatted}</div>
            <h2 class="briefing-headline">${escHtml(data.headline)}</h2>
            <div class="briefing-meta">
              <div class="briefing-meta-item">📰 <strong>${stats.total_articles || '—'}</strong> articles</div>
              <div class="briefing-meta-item">🌐 <strong>${stats.sources_reporting || '—'}</strong> sources</div>
              <div class="briefing-meta-item">🏆 ${escHtml(stats.most_active_source || '—')}</div>
              <span class="escalation-badge escalation-${escLevel}">${esc.emoji} ${esc.text}</span>
            </div>
          </div>

          <div class="section">
            <div class="section-title">📋 Daily Summary</div>
            <div class="section-body">${data.summary || '<p>No summary available.</p>'}</div>
          </div>

          <div class="section">
            <div class="section-title">⏱️ Key Events</div>
            <div class="timeline">
              ${eventsHTML || '<p style="color:var(--text-muted);font-size:0.85rem">No key events recorded.</p>'}
            </div>
          </div>

          ${data.advancements ? `
          <div class="section">
            <div class="section-title">🎯 Strategic Advancements</div>
            <div class="section-body">${data.advancements}</div>
          </div>
          ` : ''}

          ${data.outlook ? `
          <div class="section">
            <div class="section-title">🔮 Outlook</div>
            <div class="outlook-box"><span class="outlook-icon">👁️</span> ${escHtml(data.outlook)}</div>
          </div>
          ` : ''}
        </div>
      `;
    }

    // Kick off
    init();
  </script>
</body>
</html>
